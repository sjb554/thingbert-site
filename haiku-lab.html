<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Generate strange, image-rich haikus from Thingbert's tagged poetry lexicon.">
  <title>Thingbert - Haiku Generator</title>
  <link rel="stylesheet" href="assets/css/main.css?v=20260312">
  <script src="assets/js/site.js?v=20260312" defer></script>
  <script src="assets/js/haiku-words.js" defer></script>
  <script src="assets/js/haiku-lab.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="logo" href="index.html">Thingbert</a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-label="Open navigation">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
      <nav class="site-nav" id="primary-nav">
        <a href="index.html">Home</a>
        <a href="compare-your-price-to-medicare.html">Medicare Price Comparison</a>
        <a href="haiku-lab.html" class="active" aria-current="page">Haiku Generator</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="haiku-sketch-page">
      <div class="haiku-sketch-shell haiku-sketch-shell--single">
        <section class="panel poem-panel">
          <p class="eyebrow">Poetry Engine</p>
          <h1>Haiku Generator</h1>

          <div class="controls">
            <label>
              Season
              <select id="season">
                <option value="any">Any</option>
                <option value="spring">Spring</option>
                <option value="summer">Summer</option>
                <option value="autumn">Autumn</option>
                <option value="winter">Winter</option>
              </select>
            </label>

            <label>
              Time Of Day
              <select id="time">
                <option value="any">Any</option>
                <option value="dawn">Dawn</option>
                <option value="day">Day</option>
                <option value="dusk">Dusk</option>
                <option value="night">Night</option>
              </select>
            </label>

            <label>
              Mood
              <select id="mood">
                <option value="any">Any</option>
                <option value="calm">Calm</option>
                <option value="bright">Bright</option>
                <option value="dark">Dark</option>
                <option value="tense">Tense</option>
                <option value="tender">Tender</option>
              </select>
            </label>

            <label>
              Image Style
              <select id="concreteness">
                <option value="any">Any</option>
                <option value="concrete">Concrete</option>
                <option value="mixed">Mixed</option>
                <option value="abstract">Abstract</option>
              </select>
            </label>
          </div>

          <div class="panel-actions">
            <button id="generate" type="button">Generate Haiku</button>
          </div>

          <div class="poem-card poem-card--inline">
            <div class="poem-stack" id="poem">
              <div class="poem-line">waiting for words</div>
              <div class="poem-line">paper light before the first line</div>
              <div class="poem-line">breath above the page</div>
            </div>
            <p class="meta" id="metaText">Ready.</p>
          </div>

          <div class="dataset" id="datasetSummary">Loading word dataset...</div>
        </section>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <small>&copy; 2026 Thingbert</small>
    </div>
  </footer>
</body>
</html>
